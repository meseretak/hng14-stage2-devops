name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: localhost:5000

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1: LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python (flake8)
        run: |
          flake8 api/main.py worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Lint JavaScript (eslint)
        run: npm run lint
        working-directory: frontend

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ─────────────────────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r api/requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: api
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml:../coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────────
  # STAGE 3: BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set SHA output
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build \
            -t $REGISTRY/api:${{ steps.meta.outputs.sha }} \
            -t $REGISTRY/api:latest ./api
          docker push $REGISTRY/api:${{ steps.meta.outputs.sha }}
          docker push $REGISTRY/api:latest

      - name: Build and push worker image
        run: |
          docker build \
            -t $REGISTRY/worker:${{ steps.meta.outputs.sha }} \
            -t $REGISTRY/worker:latest ./worker
          docker push $REGISTRY/worker:${{ steps.meta.outputs.sha }}
          docker push $REGISTRY/worker:latest

      - name: Build and push frontend image
        run: |
          docker build \
            -t $REGISTRY/frontend:${{ steps.meta.outputs.sha }} \
            -t $REGISTRY/frontend:latest ./frontend
          docker push $REGISTRY/frontend:${{ steps.meta.outputs.sha }}
          docker push $REGISTRY/frontend:latest

  # ─────────────────────────────────────────────
  # STAGE 4: SECURITY SCAN
  # ─────────────────────────────────────────────
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    # Each job gets a fresh runner — rebuild images locally for scanning
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t api:scan ./api
          docker build -t worker:scan ./worker
          docker build -t frontend:scan ./frontend

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "api:scan"
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          vuln-type: "os"
          exit-code: "1"

      - name: Scan worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "worker:scan"
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          vuln-type: "os"
          exit-code: "1"

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "frontend:scan"
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          vuln-type: "os"
          exit-code: "1"

      - name: Upload Trivy SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ─────────────────────────────────────────────
  # STAGE 5: INTEGRATION TEST
  # ─────────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          echo "REDIS_PASSWORD=testpassword123" > .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for frontend to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 3
          done
          echo "Frontend never became healthy"
          docker compose logs
          exit 1

      - name: Submit a job
        id: submit
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | jq -r '.job_id')
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted job: $JOB_ID"

      - name: Poll until job completes
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          for i in $(seq 1 20); do
            STATUS=$(curl -sf "http://localhost:3000/status/$JOB_ID" | jq -r '.status')
            echo "Status: $STATUS (attempt $i/20)"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 3
          done
          echo "Job did not complete in time"
          docker compose logs
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # STAGE 6: DEPLOY (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy (Rolling Update)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          echo "${{ secrets.DEPLOY_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Write deploy script
        run: |
          cat > /tmp/deploy.sh << 'SCRIPT'
          set -e
          cd ~/hng14-stage2-devops
          git pull origin main

          docker compose up -d --build --no-deps api

          TIMEOUT=60
          ELAPSED=0
          CONTAINER=$(docker compose ps -q api | head -1)

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER" 2>/dev/null || echo "unknown")
            echo "Health: $HEALTH (${ELAPSED}s elapsed)"
            if [ "$HEALTH" = "healthy" ]; then
              echo "New container healthy — completing full rollout"
              docker compose up -d --build
              exit 0
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          echo "Health check failed within 60s — aborting, old container remains"
          docker compose up -d
          exit 1
          SCRIPT

      - name: Rolling deploy via SSH
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              'bash -s' < /tmp/deploy.sh

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy_key /tmp/deploy.sh
